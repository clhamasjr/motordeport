# ════════════════════════════════════════════════════════════════════
# Build + push da imagem Docker do FlowForce V2 pra GitHub Container Registry
#
# Trigger: push em main que mexa em v2-next/
# Steps:
#   1. Build Docker image multi-stage
#   2. Push pra ghcr.io/clhamasjr/flowforce-v2:latest
#
# DEPLOY automatico via WATCHTOWER (roda na VPS — monitora ghcr.io
# a cada 60s e atualiza o servico Swarm sozinho). Zero SSH externo.
# Antes era SSH push do GitHub Actions, mas Hostinger bloqueia IPs
# desconhecidos no firewall (i/o timeout).
#
# REQUER (Settings > Secrets and variables > Actions):
#   - SUPABASE_ANON_KEY = chave anon do Supabase (embutida no build)
# ════════════════════════════════════════════════════════════════════
name: Build V2 (Docker)

on:
  push:
    branches: [main]
    paths:
      - 'v2-next/**'
      - '.github/workflows/deploy-v2.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/flowforce-v2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./v2-next
          file: ./v2-next/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://motordeport.vercel.app
            NEXT_PUBLIC_SUPABASE_URL=https://xtyvnocvckbvhwvdwdpo.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Summary
        run: |
          echo "✅ Image pushed: ${{ steps.meta.outputs.tags }}"
          echo "🔄 Watchtower vai atualizar a VPS em ~60s automaticamente"
