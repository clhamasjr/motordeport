<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<title>FlowForce</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='3' y='23' font-size='16' font-weight='900' fill='white'>FF</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080F;--sf:#0A1120;--card:#111827;--brd:#1E293B;--acc:#3B82F6;--grn:#22C55E;--red:#EF4444;--ylw:#EAB308;--pur:#A78BFA;--org:#F97316;--pnk:#EC4899;--t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;--cyan:#06B6D4;--glow:0 0 20px rgba(59,130,246,.08)}
body{background:var(--bg);color:var(--t1);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::selection{background:var(--acc);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fi{animation:fadeIn .35s ease both}.shake{animation:shake .3s ease}
button{font-family:inherit;cursor:pointer;transition:all .15s;border:none;background:none}button:hover{filter:brightness(1.15)}
input,select,textarea{font-family:inherit;outline:none;font-size:14px}.rh:hover{background:rgba(59,130,246,0.04)!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,rgba(59,130,246,.06),transparent 60%)}
.login-box{width:100%;max-width:440px;animation:fadeIn .5s ease}
.login-logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:40px}
.login-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#0EA5E9,var(--acc));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;letter-spacing:-1px;box-shadow:0 8px 32px rgba(59,130,246,.3)}
.login-card{background:var(--sf);border:1px solid var(--brd);border-radius:20px;padding:40px 36px;box-shadow:0 0 20px rgba(59,130,246,.08)}
.form-group{margin-bottom:20px}.form-label{display:block;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:14px;transition:border .2s}.form-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#0EA5E9,var(--acc));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:16px;min-height:20px}
.header{background:rgba(10,17,32,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0EA5E9,var(--acc));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;letter-spacing:-1px}
.hdr-user{display:flex;align-items:center;gap:10px;padding:6px 14px;border-radius:10px;background:var(--card);border:1px solid var(--brd);margin-right:8px}
.hdr-user-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#0EA5E9,var(--acc));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--brd);color:var(--t2);background:transparent}
.btn-grn{border-color:var(--grn);color:var(--grn)}.btn-red{border-color:var(--red);color:var(--red)}.btn-cyan{border-color:var(--cyan);color:var(--cyan)}
.btn-acc{background:linear-gradient(135deg,#0EA5E9,var(--acc));color:#fff;border:none;padding:10px 28px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 12px rgba(59,130,246,.2)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.container{max-width:1520px;margin:0 auto;padding:24px 28px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--sf);border:1px solid var(--brd);border-radius:18px;padding:32px;max-width:600px;width:100%;animation:fadeIn .25s ease;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.table-wrap{background:var(--card);border-radius:14px;border:1px solid var(--brd);overflow:hidden;box-shadow:0 0 20px rgba(59,130,246,.08)}
.table-scroll{overflow:auto;max-height:62vh}
table{width:100%;border-collapse:collapse}
th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card);z-index:2;white-space:nowrap}
td{padding:10px 14px;font-size:13px;color:var(--t1);border-bottom:1px solid var(--brd);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
td.right,th.right{text-align:right}td.mono{font-family:monospace;font-size:12px}
.pill{display:inline-block;padding:3px 11px;border-radius:6px;font-size:11px;font-weight:700}
.pill-default{background:rgba(255,255,255,.06);color:var(--t2)}.pill-acc{background:rgba(59,130,246,.12);color:var(--acc)}.pill-pur{background:rgba(167,139,250,.12);color:var(--pur)}.pill-ylw{background:rgba(234,179,8,.12);color:var(--ylw)}.pill-grn{background:rgba(34,197,94,.14);color:var(--grn)}.pill-red{background:rgba(239,68,68,.12);color:var(--red)}.pill-org{background:rgba(249,115,22,.14);color:var(--org)}.pill-pnk{background:rgba(236,72,153,.14);color:var(--pnk)}.pill-cyan{background:rgba(6,182,212,.14);color:var(--cyan)}
.pager{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:1px solid var(--brd);background:var(--sf);font-size:13px}
.pager-btns{display:flex;gap:4px;align-items:center}.pager-btns button{padding:5px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:13px}
.search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-bar input{padding:9px 14px;border-radius:10px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:13px;width:260px}
.search-bar select{padding:9px 14px;border-radius:10px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:13px}
.kpi-grid{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}
.kpi{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--brd);flex:1 1 160px;min-width:140px;box-shadow:0 0 20px rgba(59,130,246,.08)}
.kpi-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}.kpi-value{font-size:22px;font-weight:800}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
.tabs{display:flex;gap:3px;margin-bottom:22px;background:var(--sf);border-radius:12px;padding:4px;border:1px solid var(--brd);flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:9px;font-weight:700;font-size:13px;color:var(--t2);transition:all .15s}.tab.active{background:linear-gradient(135deg,#0EA5E9,var(--acc));color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.tab-badge{margin-left:5px;padding:1px 7px;border-radius:5px;font-size:11px}.tab.active .tab-badge{background:rgba(255,255,255,.2)}.tab:not(.active) .tab-badge{background:var(--brd)}
.upload-box{border:2px dashed var(--brd);border-radius:20px;padding:60px 48px;text-align:center;cursor:pointer;background:var(--sf);max-width:500px;width:100%;transition:all .2s}.upload-box:hover,.upload-box.drag{border-color:var(--acc);box-shadow:0 0 30px rgba(59,130,246,.1)}
.mapa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.rmc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.taxa-bar{height:8px;border-radius:4px;background:var(--brd);overflow:hidden}.taxa-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--pur))}
.pipe-stages{display:flex;gap:6px;margin-bottom:22px;align-items:center}
.pipe-stage{padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--brd);background:var(--card);color:var(--t2);transition:all .15s}
.pipe-stage.active{background:linear-gradient(135deg,#0EA5E9,var(--acc));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.pipe-stage .pipe-n{margin-left:7px;padding:2px 8px;border-radius:5px;font-size:11px}
.pipe-stage.active .pipe-n{background:rgba(255,255,255,.2)}.pipe-stage:not(.active) .pipe-n{background:var(--brd)}
.pipe-arrow{color:var(--t3);font-size:18px}
.chk{width:18px;height:18px;accent-color:var(--acc);cursor:pointer}
.wpp-tpl{width:100%;min-height:110px;padding:14px;border-radius:10px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:14px;resize:vertical}
.wpp-vars{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.wpp-var{padding:4px 10px;border-radius:6px;background:var(--card);border:1px solid var(--brd);font-size:12px;color:var(--cyan);cursor:pointer}
.sel-btn{font-size:11px;border:none;padding:5px 12px;border-radius:6px;font-weight:700;background:transparent;cursor:pointer;white-space:nowrap}
/* Global CPF search */
.gsearch{position:relative;margin-left:auto;margin-right:12px}
.gsearch input{padding:8px 14px 8px 34px;border-radius:10px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:13px;width:180px;transition:all .3s}
.gsearch input:focus{width:280px;border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.gsearch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}
.gsearch-results{position:absolute;top:calc(100% + 6px);left:0;right:-60px;background:var(--sf);border:1px solid var(--brd);border-radius:14px;max-height:420px;overflow-y:auto;z-index:60;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none}
.gsr-item{padding:14px 18px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .1s}.gsr-item:hover{background:rgba(59,130,246,.06)}
.gsr-item:last-child{border-bottom:none}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}.rmc-grid,.mapa-grid{grid-template-columns:1fr}.container{padding:14px}.header{padding:0 14px}.pipe-stages{flex-wrap:wrap}.gsearch input{width:120px}}
</style>
</head>
<body>
<div id="loginScreen" class="login-wrap"><div class="login-box"><div class="login-logo"><div class="login-logo-icon">FF</div><div><div style="font-size:26px;font-weight:800">FlowForce</div><div style="font-size:13px;color:var(--t3)">Motor de Operações</div></div></div><div class="login-card" id="loginCard"><div style="font-size:20px;font-weight:700;text-align:center;margin-bottom:4px">Bem-vindo</div><div style="font-size:12px;color:var(--t2);text-align:center;margin-bottom:28px">Entre com suas credenciais</div><div class="form-group"><label class="form-label">Usuário</label><input class="form-input" type="text" id="loginUser" placeholder="Usuário" onkeydown="if(event.key==='Enter')doLogin()"></div><div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="loginPass" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="login-btn" onclick="doLogin()">Entrar</button><div class="login-error" id="loginError"></div></div></div></div>
<div id="appScreen" style="display:none"><header class="header"><div class="logo" style="cursor:pointer" onclick="resetData()"><div class="logo-icon">FF</div><div><div style="font-size:15px;font-weight:800">FlowForce</div><div style="font-size:10px;color:var(--t3);font-weight:600">Motor de Operações</div></div></div><div style="display:flex;align-items:center;gap:6px"><div class="gsearch" id="gsearchBox"><span class="gsearch-icon">🔍</span><input type="text" id="gsearchInput" placeholder="Buscar CPF..." oninput="globalSearch(this.value)" onfocus="this.parentElement.querySelector('.gsearch-results').style.display='block'" onblur="setTimeout(()=>{document.querySelector('.gsearch-results').style.display='none'},200)"><div class="gsearch-results" id="gsearchResults"></div></div><div class="hdr-user" id="hdrUser"></div><div id="headerActions" style="display:flex;gap:6px;align-items:center"><span id="fileName" style="font-size:10px;color:var(--t3);margin-right:4px"></span><button class="btn btn-grn" onclick="exportXLSX()">↓ Exportar</button><button class="btn" onclick="resetData()">Nova Base</button></div><button class="btn btn-red btn-sm" onclick="doLogout()">Sair</button></div></header><div class="container" id="appContainer"></div></div>
<div id="changePwModal" class="modal-overlay" style="display:none"><div class="modal-box" style="max-width:420px"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Alterar Senha</div><div class="form-group"><label class="form-label">Atual</label><input class="form-input" type="password" id="cpwOld"></div><div class="form-group"><label class="form-label">Nova</label><input class="form-input" type="password" id="cpwNew"></div><div class="form-group"><label class="form-label">Confirmar</label><input class="form-input" type="password" id="cpwConfirm"></div><div style="display:flex;gap:8px"><button class="login-btn" style="flex:1" onclick="doChangePw()">Salvar</button><button class="btn" style="padding:12px 20px" onclick="document.getElementById('changePwModal').style.display='none'">Cancelar</button></div><div class="login-error" id="cpwError"></div></div></div>
<div id="phoneModal" class="modal-overlay" style="display:none"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700">📱 Telefones</div><button class="btn btn-sm" onclick="document.getElementById('phoneModal').style.display='none'">✕</button></div><div id="pmName" style="font-size:13px;color:var(--t2);margin-bottom:2px"></div><div id="pmCPF" style="font-size:11px;color:var(--t3);margin-bottom:14px;font-family:monospace"></div><div id="pmContent"></div><div id="pmActions" style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap"></div></div></div>
<div id="batchModal" class="modal-overlay" style="display:none"><div class="modal-box" style="max-width:420px"><div style="font-size:16px;font-weight:700;margin-bottom:12px">⏳ Processando</div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span id="bCnt" style="font-size:12px;color:var(--t2)">0/0</span><span id="bPct" style="font-size:12px;font-weight:700;color:var(--acc)">0%</span></div><div class="taxa-bar" style="height:8px"><div id="bBar" class="taxa-fill" style="width:0%"></div></div><div id="bStat" style="font-size:11px;color:var(--t2);margin:10px 0"></div><button class="btn btn-red" onclick="bCancel=true">Cancelar</button></div></div>
<div id="wppModal" class="modal-overlay" style="display:none"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:700">💬 Mensagem WhatsApp</div><button class="btn btn-sm" onclick="document.getElementById('wppModal').style.display='none'">✕</button></div><div class="form-group"><label class="form-label">Template da Mensagem</label><textarea class="wpp-tpl" id="wppTpl">Olá {nome}, tudo bem? Aqui é da FlowForce! Identificamos {qtd} oportunidade(s) de portabilidade com troco total de {troco}. Podemos conversar?</textarea></div><div class="form-group"><label class="form-label">Variáveis Disponíveis</label><div class="wpp-vars"><span class="wpp-var" onclick="insertVar('{nome}')">nome</span><span class="wpp-var" onclick="insertVar('{cpf}')">cpf</span><span class="wpp-var" onclick="insertVar('{troco}')">troco</span><span class="wpp-var" onclick="insertVar('{vlr_contrato}')">vlr_contrato</span><span class="wpp-var" onclick="insertVar('{banco}')">banco</span><span class="wpp-var" onclick="insertVar('{destino}')">destino</span><span class="wpp-var" onclick="insertVar('{qtd}')">qtd_contratos</span></div></div><div id="wppPreview" style="background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid var(--brd)"><div style="font-size:10px;color:var(--t3);margin-bottom:6px">PRÉ-VISUALIZAÇÃO</div><div id="wppPreviewText" style="font-size:13px;line-height:1.5"></div></div><div id="wppTargetInfo" style="font-size:12px;color:var(--t2);margin-bottom:14px"></div><div style="display:flex;gap:8px"><button class="btn-acc" style="flex:1" onclick="sendWppBatch()">💬 Enviar WhatsApp</button><button class="btn btn-grn" onclick="exportWppList()">↓ Exportar Lista</button></div></div></div>

<script>
// ══════ AUTH ══════
function hp(p){let h=0;const s=p+"lhamas2024";for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return"H"+Math.abs(h).toString(36)}
function getU(){try{return JSON.parse(localStorage.getItem("lhm_users"))}catch{return null}}
function saveU(u){localStorage.setItem("lhm_users",JSON.stringify(u))}
function initU(){let u=getU();if(!u){u=[{id:1,user:"admin",name:"Administrador",pw:hp("admin123"),role:"admin",created:Date.now()},{id:2,user:"operador",name:"Operador",pw:hp("op123"),role:"user",created:Date.now()}];saveU(u)}return u}
function getSess(){try{let s=JSON.parse(localStorage.getItem("lhm_sess"));if(!s||Date.now()-s.ts>864e5)return null;return s}catch{return null}}
let CU=null;
function doLogin(){const u=document.getElementById("loginUser").value.trim().toLowerCase(),p=document.getElementById("loginPass").value,err=document.getElementById("loginError");if(!u||!p){err.textContent="Preencha todos os campos";return}const users=initU(),f=users.find(x=>x.user.toLowerCase()===u&&x.pw===hp(p));if(!f){err.textContent="Usuário ou senha incorretos";document.getElementById("loginCard").classList.add("shake");setTimeout(()=>document.getElementById("loginCard").classList.remove("shake"),350);return}CU=f;localStorage.setItem("lhm_sess",JSON.stringify({user:f.user,name:f.name,role:f.role,ts:Date.now()}));showApp()}
function doLogout(){localStorage.removeItem("lhm_sess");CU=null;document.getElementById("appScreen").style.display="none";document.getElementById("loginScreen").style.display="flex";S={data:null,tab:"dash",q:"",sort:{c:null,d:"asc"},pg:0,rmcF:"ALL",fname:"",pipeStage:"sel"}}
function showApp(){document.getElementById("loginScreen").style.display="none";document.getElementById("appScreen").style.display="block";document.getElementById("hdrUser").innerHTML=`<div class="hdr-user-icon">${CU.name.charAt(0)}</div><div><div style="font-size:11px;font-weight:600">${esc(CU.name)}</div><div style="font-size:9px;color:var(--t3)">${CU.role==="admin"?"Admin":"Op"}</div></div><button class="btn btn-sm" onclick="document.getElementById('changePwModal').style.display='flex'" style="margin-left:4px;font-size:9px">🔑</button>`;renderApp()}
function doChangePw(){const o=document.getElementById("cpwOld").value,n=document.getElementById("cpwNew").value,c=document.getElementById("cpwConfirm").value,err=document.getElementById("cpwError");if(!o||!n||!c){err.textContent="Preencha tudo";return}if(hp(o)!==CU.pw){err.textContent="Incorreta";return}if(n.length<4){err.textContent="Mín 4";return}if(n!==c){err.textContent="Não conferem";return}let users=getU();let i=users.findIndex(u=>u.user===CU.user);if(i>=0){users[i].pw=hp(n);saveU(users);CU.pw=hp(n)}err.style.color="var(--grn)";err.textContent="Alterada!";setTimeout(()=>document.getElementById("changePwModal").style.display="none",1000)}

// ══════ HISTORY ══════
function getHist(){try{return JSON.parse(localStorage.getItem("lhm_hist")||"[]")}catch{return[]}}
function getMyHist(){let h=getHist();if(!CU)return[];if(CU.role==="admin")return h;return h.filter(x=>x.userLogin===CU.user)}
function saveHist(h){try{localStorage.setItem("lhm_hist",JSON.stringify(h.slice(0,30)))}catch{}}
function addHist(fn,sm,data){
  let id=Date.now();
  let h=getHist();h.unshift({id,fname:fn,user:CU?CU.name:"",userLogin:CU?CU.user:"",date:new Date().toLocaleString("pt-BR"),summary:sm});saveHist(h);
  // Auto-save data
  if(data){try{
    let sv={elegiveis:data.elegiveis,mapaArr:data.mapaArr,rmcRcc:data.rmcRcc||[],taxaDist:data.taxaDist||{},aLen:data.analise?data.analise.length:data.elegiveis.length,phones:{}};
    for(let k of Object.keys(phoneCache))sv.phones[k]=phoneCache[k];
    localStorage.setItem("lhm_data_"+id,JSON.stringify(sv));
  }catch(e){try{

function selByTroco(){

function selByCombo(){
  if(!S.data)return;
  let rmcMap={};for(let r of S.data.rmcRcc)rmcMap[r.cpf]=r;
  let grouped=groupByCPF(S.data.elegiveis);
  let count=0;
  for(let g of grouped){
    let r=rmcMap[g.cpf];
    let temMargem=r&&r.mrgCart>0;
    let semCartao=r&&!r.temRmc&&!r.temRcc;
    if(temMargem&&semCartao&&g.trocoTotal>0){
      for(let c of g.contratos)selected.add(c.cpf);count+=g.contratos.length;
    }

// ══════ GROUP BY CLIENT ══════
function groupByCPF(items){
  let map={};
  for(let r of items){
    if(!map[r.cpf]){map[r.cpf]={cpf:r.cpf,nome:r.nome,t1:r.t1||"",t2:r.t2||"",t3:r.t3||"",contratos:[],qtd:0,trocoTotal:0,vcTotal:0,bancos:new Set()}}
    let g=map[r.cpf];g.contratos.push(r);g.qtd++;g.trocoTotal+=r.troco;g.vcTotal+=r.vc;g.bancos.add(r.dest);
  }
  return Object.values(map).sort((a,b)=>b.trocoTotal-a.trocoTotal);
}

async function batchHig(){

function sendWppBatch(){
  if(!S.data)return;
  let tpl=document.getElementById("wppTpl").value;
  let targets=[];
  let grouped=groupByCPF(S.data.elegiveis.filter(e=>selected.has(e.cpf)));
  for(let g of grouped){
    let msg=tpl.replace(/{nome}/g,g.nome).replace(/{cpf}/g,g.cpf).replace(/{troco}/g,R$(g.trocoTotal)).replace(/{vlr_contrato}/g,R$(g.vcTotal)).replace(/{qtd}/g,String(g.qtd)).replace(/{banco}/g,[...g.bancos].join(", ")).replace(/{destino}/g,[...g.bancos].join(", "));

    else{let ph=phoneCache[g.cpf];if(!ph||!ph.telefones)continue;let wpp=ph.telefones.find(t=>t.whatsapp);if(!wpp)continue;num=`55${wpp.ddd}${wpp.telefone}`}

  }
  if(!targets.length){alert("Nenhum contato com telefone válido");return}

  if(wppState.connected){
    if(!confirm(`Enviar ${targets.length} mensagens via Evolution API?\n\nInstância: ${getMyInstance()}`))return;

      for(let t of targets){

      }

    // Fallback: open wa.me links

    let i=0;
    function openNext(){if(i>=targets.length)return;let t=targets[i];window.open(`https://wa.me/${t.num}?text=${encodeURIComponent(t.msg)}`,"_blank");wppSent.add(t.cpf);i++;if(i<targets.length)setTimeout(openNext,1500);else{S.pipeStage="wpp";renderApp();document.getElementById("wppModal").style.display="none"}}

const COEFS=[{t:1.85,c:0.02299},{t:1.80,c:0.02451},{t:1.78,c:0.02250},{t:1.75,c:0.021985},{t:1.72,c:0.02175},{t:1.70,c:0.021604},{t:1.68,c:0.02145},{t:1.66,c:0.02130}];

const ORDEM=["QUALI","FACTA","BRB","DIGIO"],B1P=["149","422","739","925","380","033","326","290","041","389","121"],ESP_INV=[4,5,6,32,33,34,51,83,92],ESP_AUX=[31,36,91,94],CARTAO={PAN:"623",BMG:"318",Daycoval:"707"};
function pV(v){if(v==null||v==="")return 0;if(typeof v==="number")return v;let s=String(v).replace(/R\$\s*/g,"").replace(/\s/g,"");if(s.includes(","))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;if(s.includes("."))return parseFloat(s)||0;let n=parseInt(s,10);return isNaN(n)?0:n>99?n/100:n}
function pP(v){if(v==null||v==="")return[0,0,0];let m=String(v).match(/(\d+)\s*[/\\]\s*(\d+)/);if(m){let r=+m[1],t=+m[2];return[r,t,t-r]}let n=parseInt(v,10);return[n||0,n||0,0]}
function pC(v){if(v==null||v==="")return"";return String(typeof v==="number"?Math.floor(v):v).trim().padStart(3,"0")}
function pEN(e){if(!e)return 0;let m=String(e).match(/^(\d+)/);return m?parseInt(m[1],10):0}
function cAge(ns){if(ns==null)return null;let d;if(ns instanceof Date)d=ns;else if(typeof ns==="number")d=new Date((ns-25569)*864e5);else{let s=String(ns).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),a=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))a--;return{age:a}}
function cBY(dib){if(dib==null)return null;let d;if(dib instanceof Date)d=dib;else if(typeof dib==="number")d=new Date((dib-25569)*864e5);else{let s=String(dib).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),y=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))y--;return y}
function bestR(p,s,t,fx){let pool=fx?COEFS.filter(c=>c.t>=fx[0]&&c.t<=fx[1]):COEFS;for(let{t:tx,c}of pool){let vc=p/c,tr=vc-s;if(tr>=t)return{t:tx,c,vc,tr}}return null}
function testar(p,s,pg,cd,inv,age,bY,rest){let i1=B1P.includes(cd);for(let b of ORDEM){let r=BD[b];if(r.block.includes(cd))continue;if(r.pMin&&p<r.pMin)continue;if(r.sMin&&s<r.sMin)continue;let pgR=i1?1:r.pgMin;if(pgR&&pg<pgR)continue;if(inv&&age!==null){if(age<55)continue;if(age>=55&&age<=57&&(bY===null||bY<15))continue;if(rest>0&&rest>(75-age)*12)continue}if(r.coefF){let vc=p/r.coefF,tr=vc-s;if(tr<r.tMin)continue;let tx=COEFS.find(x=>x.c===r.coefF);return{banco:b,troco:tr,vc,taxa:tx?tx.t:0,i1}}let res=bestR(p,s,r.tMin,r.faixa);if(res)return{banco:b,troco:res.tr,vc:res.vc,taxa:res.t,i1}}return null}
function findAllPos(H,nm){let r=[],n=nm.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();for(let i=0;i<H.length;i++){let h=String(H[i]||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();if(h===n)r.push(i)}return r}

function processar(data){
  if(!data||data.length<2)return null;let H=data[0].map(h=>h?String(h).trim():""),rows=data.slice(1);
  let cNm=findFirst(H,["Nome"]),cCP=findFirst(H,["CPF"]),cBn=findFirst(H,["Beneficio"]),cEs=findFirst(H,["Especie"]),cNs=findFirst(H,["Data Nascimento"]),cDI=findFirst(H,["DIB"]),cT1=findFirst(H,["Telefone1"]),cT2=findFirst(H,["Telefone2"]),cT3=findFirst(H,["Telefone3"]);
  let cMg=findFirst(H,["Margem"]);
  let allTE=findAllPos(H,"Tipo Emprestimo"),allCon=findAllPos(H,"Contrato"),allCod=findAllPos(H,"Codigo"),allVE=findAllPos(H,"Valor Emprestimo"),allMC=findAllPos(H,"Margem Cartao"),allVP=findAllPos(H,"Valor Parcela"),allPr=findAllPos(H,"Prazo"),allSQ=findAllPos(H,"Saldo Quitacao");
  let cardBlocks=[];for(let te of allTE){let mc=allMC.find(m=>m>te&&m<te+8);if(mc!==undefined)cardBlocks.push({te,mc})}
  let rmcB=null,rccB=null;
  if(cardBlocks.length>=1){let{te,mc}=cardBlocks[0];rmcB={tipo:te,con:allCon.find(c=>c>te&&c<te+8),cod:allCod.find(c=>c>te&&c<te+8),val:allVE.find(v=>v>te&&v<te+8),mc}}
  if(cardBlocks.length>=2){let{te,mc}=cardBlocks[1];rccB={tipo:te,con:allCon.find(c=>c>te&&c<te+8),cod:allCod.find(c=>c>te&&c<te+8),val:allVE.find(v=>v>te&&v<te+8),mc}}
  let lbs=[];for(let vp of allVP){let con=allCon.filter(c=>c<vp).pop(),cod=allCod.find(c=>c>con-1&&c<vp),prz=allPr.find(p=>p>vp&&p<vp+4),sq=allSQ.find(s=>s>vp&&s<vp+5);if(con!==undefined)lbs.push({cc:con,ck:cod,cp:vp,cz:prz,cs:sq})}
  // Also look for standalone margin columns
  let cMDE=findFirst(H,["Margem Disponivel Emprestimo","MargemDisponivelEmprestimo","Margem Emprestimo"]);
  let cMDR=findFirst(H,["Margem Disponivel Rcc","MargemDisponivelRcc","Margem Rcc","Margem Disponivel Cartao"]);
  let analise=[],elegiveis=[],rmcAll=[];
  let g=(r,c)=>c!=null&&c>=0&&r[c]!=null?String(r[c]).trim():"",gv=(r,c)=>c!=null&&c>=0?pV(r[c]):0,gr=(r,c)=>c!=null&&c>=0?r[c]:null;
  const COEF185=0.02299,COEF_CART=0.029214;
  for(let row of rows){
    let nome=g(row,cNm),cpf=g(row,cCP);if(!nome&&!cpf)continue;
    let ben=g(row,cBn),esp=g(row,cEs),t1=g(row,cT1),t2=g(row,cT2),t3=g(row,cT3);
    let eN=pEN(esp),isInv=ESP_INV.includes(eN),isAux=ESP_AUX.includes(eN)||String(esp).toUpperCase().includes("AUXIL"),ai=cAge(gr(row,cNs)),idade=ai?ai.age:null,bY=cBY(gr(row,cDI));
    if(isAux)continue;
    let tRmc=rmcB?g(row,rmcB.tipo):"",cRmc=rmcB?pC(gr(row,rmcB.cod)??""):"",vRmc=rmcB?gv(row,rmcB.val):0;
    let tRcc=rccB?g(row,rccB.tipo):"",cRcc=rccB?pC(gr(row,rccB.cod)??""):"",vRcc=rccB?gv(row,rccB.val):0;
    let margemBase=cMg>=0?gv(row,cMg):0;
    let mRmc=rmcB&&rmcB.mc!=null?gv(row,rmcB.mc):0;
    let mRcc=rccB&&rccB.mc!=null?gv(row,rccB.mc):0;
    let mDE=cMDE>=0?gv(row,cMDE):0;
    let mDR=cMDR>=0?gv(row,cMDR):0;
    let margem=margemBase>0?margemBase:Math.max(mRmc,mRcc,mDE,mDR);
    // Detect REAL RMC/RCC (client HAS a card)
    let realRmc=cRmc&&cRmc!=="000"&&(vRmc>0||tRmc.toUpperCase().includes("RMC"));
    let realRcc=cRcc&&cRcc!=="000"&&(vRcc>0||tRcc.toUpperCase().includes("RCC"));
    let temCartao=!!realRmc||!!realRcc;
    // Only calculate potential for clients WITHOUT any card
    let margemCartNova=0,margemEmpNova=0;
    if(margem>0&&!temCartao){
      margemEmpNova=Math.round((margem/COEF185)*100)/100;
      margemCartNova=Math.round((margem/COEF_CART)*100)/100;
    }
    // Add to rmcAll: clients with card (for saque complementar) OR with margin (for new card)
    if(temCartao||margem>0){
      rmcAll.push({nome,cpf,ben,esp,t1,t2,t3,tRmc,cRmc:realRmc?cRmc:"",vRmc:Math.round(vRmc*100)/100,tRcc,cRcc:realRcc?cRcc:"",vRcc:Math.round(vRcc*100)/100,
        mrgCart:Math.round(margem*100)/100,mrgCartNova:margemCartNova,mrgEmpNova:margemEmpNova,temRmc:!!realRmc,temRcc:!!realRcc,temCartao});
    }
    for(let lb of lbs){
      let con=g(row,lb.cc),par=gv(row,lb.cp),sal=gv(row,lb.cs);let[rest,tot,pag]=lb.cz!=null?pP(row[lb.cz]):[0,0,0];let cod=lb.ck!=null?pC(gr(row,lb.ck)??""):"";
      if(!con&&par===0&&sal===0)continue;let i1=B1P.includes(cod);let res=testar(par,sal,pag,cod,isInv,idade,bY,rest);
      let reg={nome,cpf,ben,esp,con,cod,par:Math.round(par*100)/100,sal:Math.round(sal*100)/100,prazo:`${rest}/${tot}`,pag,idade:idade??"-",isInv,is1p:i1,dest:res?res.banco:"-",troco:res?Math.round(res.troco*100)/100:0,vc:res?Math.round(res.vc*100)/100:0,taxa:res?res.taxa:"-",ok:!!res,t1,t2,t3};
      analise.push(reg);if(res)elegiveis.push(reg);
    }
  }
  let mapa={};for(let e of elegiveis){if(!mapa[e.dest])mapa[e.dest]={banco:e.dest,n:0,total:0,vcTotal:0};mapa[e.dest].n++;mapa[e.dest].total+=e.troco;mapa[e.dest].vcTotal+=e.vc}
  let mapaArr=ORDEM.map(b=>mapa[b]||{banco:b,n:0,total:0,vcTotal:0}).filter(m=>m.n>0).map(m=>({...m,med:m.n?m.total/m.n:0,vcMed:m.n?m.vcTotal/m.n:0}));
  let taxaDist={};for(let e of elegiveis)taxaDist[e.taxa]=(taxaDist[e.taxa]||0)+1;
  return{analise,elegiveis,mapaArr,rmcRcc:rmcAll,taxaDist}
}

// ══════ GLOBAL CPF SEARCH ══════
function globalSearch(q){
  let res=document.getElementById("gsearchResults");if(!res)return;
  let v=q.replace(/\D/g,"").trim();
  if(v.length<3){res.style.display="none";res.innerHTML="";return}
  // Search across all history data
  let results=[];
  let hist=getHist();
  for(let h of hist){
    try{
      let raw=localStorage.getItem("lhm_data_"+h.id);if(!raw)continue;
      let sv=JSON.parse(raw);
      let eleg=sv.elegiveis||[];
      for(let e of eleg){
        if((e.cpf||"").includes(v)||(e.ben||"").includes(v)){
          results.push({...e,fonte:h.fname,histId:h.id,date:h.date});
        }
      }
    }catch{}
  }
  // Also search current data
  if(S.data){
    for(let e of S.data.analise||[]){
      if((e.cpf||"").includes(v)||(e.ben||"").includes(v)){
        if(!results.find(r=>r.cpf===e.cpf&&r.con===e.con))results.push({...e,fonte:"Atual",histId:null})
      }
    }
  }
  if(!results.length){res.innerHTML=`<div style="padding:18px;text-align:center;color:var(--t3);font-size:13px">Nenhum resultado para "${v}"</div>`;res.style.display="block";return}
  // Group by CPF
  let grp={};for(let r of results){if(!grp[r.cpf])grp[r.cpf]={nome:r.nome,cpf:r.cpf,ben:r.ben,contratos:[],fontes:new Set()};grp[r.cpf].contratos.push(r);grp[r.cpf].fontes.add(r.fonte)}
  let html="";for(let cpf of Object.keys(grp).slice(0,10)){
    let g=grp[cpf];let tTroco=g.contratos.reduce((s,c)=>s+c.troco,0);let tVC=g.contratos.reduce((s,c)=>s+c.vc,0);let nEleg=g.contratos.filter(c=>c.ok).length;
    html+=`<div class="gsr-item" onclick="showCPFDetail('${cpf}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:700;font-size:14px">${esc(g.nome)}</div><div style="font-size:12px;color:var(--t2);font-family:monospace;margin-top:2px">CPF: ${cpf} ${g.ben?"| Ben: "+g.ben:""}</div></div>
        <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--grn)">${R$(tTroco)}</div><div style="font-size:10px;color:var(--t3)">${g.contratos.length} contr | ${nEleg} eleg</div></div>
      </div>
      <div style="font-size:10px;color:var(--t3);margin-top:4px">Fonte: ${[...g.fontes].join(", ")}</div>
    </div>`;
  }
  if(Object.keys(grp).length>10)html+=`<div style="padding:10px;text-align:center;font-size:11px;color:var(--t3)">+${Object.keys(grp).length-10} resultados...</div>`;
  res.innerHTML=html;res.style.display="block";
}
function showCPFDetail(cpf){
  // Find all data for this CPF across history
  let allRows=[];
  let hist=getHist();
  for(let h of hist){try{let raw=localStorage.getItem("lhm_data_"+h.id);if(!raw)continue;let sv=JSON.parse(raw);for(let e of(sv.elegiveis||[]))if(e.cpf===cpf)allRows.push(e)}catch{}}
  if(S.data)for(let e of(S.data.analise||[]))if(e.cpf===cpf&&!allRows.find(r=>r.con===e.con))allRows.push(e);
  if(!allRows.length){alert("Nenhum dado encontrado para "+cpf);return}
  let nome=allRows[0].nome,ben=allRows[0].ben;
  let tTroco=allRows.reduce((s,r)=>s+r.troco,0),tVC=allRows.reduce((s,r)=>s+r.vc,0);
  let html=`<div style="font-size:18px;font-weight:800;margin-bottom:4px">${esc(nome)}</div>
    <div style="font-size:13px;color:var(--t2);font-family:monospace;margin-bottom:16px">CPF: ${cpf} ${ben?"| Benefício: "+ben:""}</div>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div class="kpi" style="flex:1"><div class="kpi-label">Contratos</div><div class="kpi-value" style="color:var(--acc)">${allRows.length}</div></div>
      <div class="kpi" style="flex:1"><div class="kpi-label">Elegíveis</div><div class="kpi-value" style="color:var(--grn)">${allRows.filter(r=>r.ok).length}</div></div>
      <div class="kpi" style="flex:1"><div class="kpi-label">Troco Total</div><div class="kpi-value" style="color:var(--grn)">${R$(tTroco)}</div></div>
    </div>
    <table style="width:100%"><thead><tr><th>Contrato</th><th>Banco</th><th class="right">Parcela</th><th class="right">Saldo</th><th>Destino</th><th class="right">Vlr Contrato</th><th class="right">Troco</th></tr></thead><tbody>`;
  for(let r of allRows){let dc=r.dest!=="-"?pCls[r.dest]:"";
    html+=`<tr><td class="mono">${esc(r.con)}</td><td><span class="pill pill-default">${r.cod}</span></td><td class="right mono">${R$(r.par)}</td><td class="right mono">${R$(r.sal)}</td><td>${dc?`<span class="pill ${dc}">${r.dest}</span>`:"—"}</td><td class="right mono" style="color:var(--ylw)">${r.vc>0?R$(r.vc):"—"}</td><td class="right mono" style="color:var(--grn);font-weight:700">${r.troco>0?R$(r.troco):"—"}</td></tr>`}
  html+=`</tbody></table>`;
  document.getElementById("pmName").textContent="";
  document.getElementById("pmCPF").textContent="";
  document.getElementById("pmContent").innerHTML=html;
  document.getElementById("pmActions").innerHTML=`<button class="btn" onclick="document.getElementById('phoneModal').style.display='none'">Fechar</button>`;
  document.getElementById("phoneModal").style.display="flex";
}

// ══════ CAMPANHAS ══════
function getCamp(){try{return JSON.parse(localStorage.getItem("lhm_camp")||"[]")}catch{return[]}}
function saveCamp(c){localStorage.setItem("lhm_camp",JSON.stringify(c))}
function addCampanha(){
  let nome=prompt("Nome da campanha:");if(!nome)return;
  let c=getCamp();c.push({id:Date.now(),nome:nome.trim(),users:[],created:new Date().toLocaleString("pt-BR"),createdBy:CU?CU.name:""});saveCamp(c);renderApp()
}
function delCampanha(id){if(confirm("Excluir campanha?")){saveCamp(getCamp().filter(c=>c.id!==id));renderApp()}}
function toggleCampUser(campId,userLogin){
  let camps=getCamp();let c=camps.find(x=>x.id===campId);if(!c)return;
  let idx=c.users.indexOf(userLogin);if(idx>=0)c.users.splice(idx,1);else c.users.push(userLogin);
  saveCamp(camps);renderApp()
}
function assignToCamp(campId){
  if(!S.data||!selected.size){alert("Selecione clientes na aba Elegíveis primeiro");return}
  let camps=getCamp();let c=camps.find(x=>x.id===campId);if(!c)return;
  if(!c.cpfs)c.cpfs=[];
  let grouped=groupByCPF(S.data.elegiveis.filter(e=>selected.has(e.cpf)));
  let added=0;
  for(let g of grouped){if(!c.cpfs.find(x=>x.cpf===g.cpf)){c.cpfs.push({cpf:g.cpf,nome:g.nome,qtd:g.qtd,troco:g.trocoTotal,vc:g.vcTotal,t1:g.t1});added++}}
  saveCamp(camps);renderApp();alert(`${added} cliente(s) adicionado(s) à campanha "${c.nome}"`);
}
function removeCampCpf(campId,cpf){let camps=getCamp();let c=camps.find(x=>x.id===campId);if(!c||!c.cpfs)return;c.cpfs=c.cpfs.filter(x=>x.cpf!==cpf);saveCamp(camps);renderApp()}
function exportCamp(campId){
  let camps=getCamp();let c=camps.find(x=>x.id===campId);if(!c||!c.cpfs||!c.cpfs.length){alert("Campanha sem clientes");return}
  let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(c.cpfs.map(x=>({Nome:x.nome,CPF:x.cpf,"Qtd Contratos":x.qtd,"Troco Total":x.troco,"Vlr Contrato":x.vc,"Tel 1":x.t1||""}))),"Campanha");
  XLSX.writeFile(wb,`flowforce_campanha_${c.nome.replace(/[^a-zA-Z0-9]/g,"_")}.xlsx`);
}
function renderCampanhas(){

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div style="font-size:18px;font-weight:800">📋 Campanhas</div><button class="btn-acc" style="padding:8px 20px;font-size:12px" onclick="addCampanha()">+ Nova Campanha</button></div>`;

  if(!camps.length){html+=`<div style="text-align:center;padding:40px;color:var(--t3);font-size:14px">Nenhuma campanha criada</div>`;return html}

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">`;
    for(let u of users){let assigned=camp.users.includes(u.user);
      html+=`<button class="btn btn-sm ${assigned?"btn-grn":""}" style="${assigned?"background:rgba(34,197,94,.1)":""}" onclick="toggleCampUser(${camp.id},'${u.user}')">${assigned?"✅ ":""}${esc(u.name)}</button>`}
    html+=`</div>`;

      html+=`<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px">Clientes (${nCpfs}):</div><div class="table-wrap"><div class="table-scroll" style="max-height:220px"><table><thead><tr><th>Nome</th><th>CPF</th><th style="text-align:center">Contr</th><th class="right">Troco</th><th>Tel</th><th>Ação</th></tr></thead><tbody>`;

}

// ══════ WHATSAPP (Evolution API) ══════
let wppState={instances:[],myInst:null,connected:false,loading:false,chats:[],activeChat:null,messages:[],qr:null};

function getWppAssign(){try{return JSON.parse(localStorage.getItem("ff_wpp_assign")||"{}")}catch{return{}}}
function saveWppAssign(a){localStorage.setItem("ff_wpp_assign",JSON.stringify(a))}
function getMyInstance(){let a=getWppAssign();return CU?a[CU.user]||null:null}

async function wppCall(action,data={}){
  let inst=data.instance||getMyInstance()||'';
  const res=await fetch('/api/evolution',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,instance:inst,...data})});
  return res.json();
}

async function wppLoadInstances(){
  wppState.loading=true;renderApp();
  try{
    const d=await wppCall('list',{instance:''});
    wppState.instances=Array.isArray(d)?d:[];
    wppState.myInst=getMyInstance();
    // Check my instance status
    if(wppState.myInst){
      try{
        const s=await wppCall('status');
        wppState.connected=(s.instance&&s.instance.state==='open')||(s.state==='open');
      }catch{wppState.connected=false}
    }
    wppState.loading=false;renderApp();
  }catch(e){wppState.loading=false;wppState.instances=[];renderApp()}
}

async function wppCreateInstance(){
  let name=prompt("Nome da instância (ex: operador_joao):");
  if(!name)return;name=name.trim().replace(/[^a-zA-Z0-9_-]/g,'');
  if(!name){alert("Nome inválido");return}
  wppState.loading=true;renderApp();
  try{
    const d=await wppCall('create',{name,instance:''});
    if(d.qrcode){wppState.qr=d.qrcode.base64||null}
    await wppLoadInstances();
  }catch(e){wppState.loading=false;alert("Erro: "+e.message);renderApp()}
}

async function wppDeleteInstance(name){
  if(!confirm(`Excluir instância "${name}"? Isso desconecta o WhatsApp.`))return;
  try{
    await wppCall('delete',{instance:name});
    // Remove assignments
    let a=getWppAssign();for(let k of Object.keys(a))if(a[k]===name)delete a[k];saveWppAssign(a);
    await wppLoadInstances();
  }catch(e){alert("Erro: "+e.message)}
}

function wppAssignUser(instName,userLogin){
  let a=getWppAssign();
  if(a[userLogin]===instName)delete a[userLogin];
  else a[userLogin]=instName;
  saveWppAssign(a);renderApp();
}

async function wppConnect(){
  wppState.loading=true;wppState.qr=null;renderApp();
  let inst=getMyInstance();if(!inst){alert("Nenhuma instância atribuída");wppState.loading=false;renderApp();return}
  try{
    const d=await wppCall('connect');
    wppState.qr=d.base64||d.qrcode&&d.qrcode.base64||null;
    wppState.loading=false;renderApp();
    let tries=0;
    let poll=setInterval(async()=>{
      tries++;if(tries>40){clearInterval(poll);return}
      try{const s=await wppCall('status');
      if((s.instance&&s.instance.state==='open')||(s.state==='open')){
        clearInterval(poll);wppState.connected=true;wppState.qr=null;wppLoadChats();
      }}catch{}
    },3000);
  }catch(e){wppState.loading=false;alert('Erro: '+e.message);renderApp()}
}

async function wppDisconnect(){
  try{await wppCall('logout');wppState.connected=false;wppState.chats=[];wppState.activeChat=null;renderApp()}catch(e){alert("Erro: "+e.message)}
}

async function wppLoadChats(){
  try{
    const d=await wppCall('chats');
    wppState.chats=Array.isArray(d)?d.filter(c=>c.id&&!c.id.includes('@g.us')).slice(0,100):[];
    wppState.chats.sort((a,b)=>(b.lastMsgTimestamp||0)-(a.lastMsgTimestamp||0));
    renderApp();
  }catch{renderApp()}
}

async function wppOpenChat(jid,name){
  wppState.activeChat={jid,name};wppState.messages=[];renderApp();
  try{
    const d=await wppCall('messages',{jid,limit:50});
    wppState.messages=Array.isArray(d)?d.reverse():Array.isArray(d.messages)?d.messages.reverse():[];
    renderApp();
    setTimeout(()=>{let el=document.getElementById('wppMsgList');if(el)el.scrollTop=el.scrollHeight},100);
  }catch{renderApp()}
}

async function wppSendMsg(){
  let inp=document.getElementById('wppMsgInput');if(!inp||!inp.value.trim())return;
  let text=inp.value.trim();inp.value='';
  let number=wppState.activeChat.jid.replace('@s.whatsapp.net','');
  try{
    await wppCall('send',{number,text});
    wppState.messages.push({key:{fromMe:true},message:{conversation:text},messageTimestamp:Math.floor(Date.now()/1000)});
    renderApp();
    setTimeout(()=>{let el=document.getElementById('wppMsgList');if(el)el.scrollTop=el.scrollHeight},50);
  }catch(e){alert('Erro: '+e.message)}
}

async function wppStartChat(number){
  if(!wppState.connected){alert('WhatsApp não conectado');return}
  number=String(number).replace(/\D/g,'');
  if(!number.startsWith('55')&&number.length<=11)number='55'+number;
  let jid=number+'@s.whatsapp.net';
  S.tab='wpp';wppOpenChat(jid,number);
}

// ══════ SAQUE PIPELINE ══════
async function batchSaquePipeline(){
  if(!S.data||!selected.size){alert("Selecione clientes primeiro");return}
  let cpfs=[...new Set([...selected])];
  if(!confirm(`Consultar saque complementar de ${cpfs.length} CPFs selecionados?\n\nSerão feitas chamadas à API DataConsulta (BMG + Daycoval).`))return;
  batchProgress={running:true,total:cpfs.length,done:0,results:[]};
  S.tab="rc";S.rmcF="COMCARTAO";renderApp();
  for(let cpf of cpfs){
    try{
      const res=await fetch('/api/cartao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:cpf.replace(/\D/g,''),bancos:['BMG','DAYCOVAL']})});
      const data=await res.json();
      if(data.success){
        cardCache[cpf]=data;
        let totalSaque=data.cartoes.reduce((s,c)=>s+(c.limiteSaqueDisp||0),0);
        batchProgress.results.push({cpf,nome:data.nome,ok:true,saque:totalSaque,cartoes:data.cartoes.length});
      }else{batchProgress.results.push({cpf,nome:"",ok:false,error:data.error||"Erro"})}
    }catch(e){batchProgress.results.push({cpf,nome:"",ok:false,error:e.message})}
    batchProgress.done++;
    if(batchProgress.done%3===0)renderApp();
    await new Promise(r=>setTimeout(r,800));
  }
  batchProgress.running=false;renderApp();
  let ok=batchProgress.results.filter(r=>r.ok);
  let totalSaque=ok.reduce((s,r)=>s+r.saque,0);
  alert(`✅ Consulta concluída!\n\n${ok.length}/${cpfs.length} consultados\nSaque total disponível: ${R$(totalSaque)}`);
}

// ══════ SAQUE COMPLEMENTAR EM LOTE ══════
let batchProgress={running:false,total:0,done:0,results:[]};
async function batchSaqueComplementar(){
  if(!S.data||!S.data.rmcRcc)return;
  let comCartao=S.data.rmcRcc.filter(r=>r.temCartao);
  if(!comCartao.length){alert("Nenhum cliente com cartão encontrado");return}
  if(!confirm(`Consultar saque complementar de ${comCartao.length} clientes com cartão?\n\nIsso fará ${comCartao.length} chamadas à API DataConsulta.`))return;
  batchProgress={running:true,total:comCartao.length,done:0,results:[]};
  renderApp();
  for(let r of comCartao){
    try{
      const res=await fetch('/api/cartao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:r.cpf.replace(/\D/g,''),matricula:r.ben||""})});
      const data=await res.json();
      if(data.success){
        cardCache[r.cpf]=data;
        let totalSaque=data.cartoes.reduce((s,c)=>s+(c.limiteSaqueDisp||0),0);
        batchProgress.results.push({cpf:r.cpf,nome:r.nome,ok:true,saque:totalSaque,cartoes:data.cartoes.length});
      }else{batchProgress.results.push({cpf:r.cpf,nome:r.nome,ok:false,error:data.error||"Erro"})}
    }catch(e){batchProgress.results.push({cpf:r.cpf,nome:r.nome,ok:false,error:e.message})}
    batchProgress.done++;
    if(batchProgress.done%5===0)renderApp(); // Update UI every 5
    // Small delay to not overwhelm API
    await new Promise(r=>setTimeout(r,500));
  }
  batchProgress.running=false;
  renderApp();
  let ok=batchProgress.results.filter(r=>r.ok);
  let totalSaque=ok.reduce((s,r)=>s+r.saque,0);
  alert(`✅ Consulta em lote concluída!\n\n${ok.length}/${comCartao.length} consultados\nSaque total disponível: R$ ${(totalSaque/100).toFixed(2).replace(".",",")}`);
}
function exportSaqueComplementar(){
  let res=batchProgress.results.filter(r=>r.ok&&r.saque>0);
  if(!res.length){alert("Nenhum resultado com saque disponível");return}
  let rows=[];
  for(let r of res){let cd=cardCache[r.cpf];if(!cd)continue;
    for(let c of cd.cartoes){if((c.limiteSaqueDisp||0)>0){
      rows.push({Nome:cd.nome,CPF:r.cpf,Banco:c.banco,Produto:c.produto,Status:c.statusCartao,"Limite Cartão":c.limiteCartao,"Saque Disponível":c.limiteSaqueDisp,"Saque Mínimo":c.minimoSaque,Margem:c.margem,"Saldo Devedor":c.saldoDevedor,Matrícula:c.matricula,Tel:cd.telefones&&cd.telefones[0]?`(${cd.telefones[0].ddd}) ${cd.telefones[0].telefone}`:""})
    }}
  }
  let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Saque Complementar");
  XLSX.writeFile(wb,"flowforce_saque_complementar.xlsx");
}

// ══════ CONSULTA CARTÃO (DataConsulta) ══════
async function batchCartao(){
  if(!S.data||!S.data.rmcRcc)return;
  let src=S.data.rmcRcc;
  if(S.rmcF==="MARGEM")src=src.filter(r=>r.mrgCart>0&&!r.temCartao);else if(S.rmcF==="COMCARTAO")src=src.filter(r=>r.temCartao);
  else if(S.rmcF!=="ALL"){let cod=CARTAO[S.rmcF==="DAYCOVAL"?"Daycoval":S.rmcF];src=src.filter(r=>r.cRmc===cod||r.cRcc===cod)}
  let cpfs=[...new Set(src.map(r=>r.cpf))].filter(c=>c&&!cardCache[c]);
  if(!cpfs.length){alert("Todos já consultados ou nenhum na lista!");return}
  if(!confirm("Consultar cartões de "+cpfs.length+" clientes?\n\n⚠️ Essa consulta tem custo na API."))return;
  bCancel=false;document.getElementById("batchModal").style.display="flex";
  let done=0,ok=0,fail=0;
  for(let cpf of cpfs){
    if(bCancel)break;
    let r=src.find(x=>x.cpf===cpf);
    document.getElementById("bStat").textContent=r?r.nome:cpf;
    try{
      const res=await fetch("/api/cartao",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cpf:cpf.replace(/\D/g,""),matricula:r?r.ben:""})});
      const data=await res.json();
      if(data.success||data.cartoes){cardCache[cpf]=data;ok++}else{fail++}
    }catch{fail++}
    done++;let p=Math.round(done/cpfs.length*100);
    document.getElementById("bCnt").textContent=done+"/"+cpfs.length;
    document.getElementById("bPct").textContent=p+"%";
    document.getElementById("bBar").style.width=p+"%";
    await new Promise(r=>setTimeout(r,500));
  }
  document.getElementById("bStat").innerHTML=`<span style="color:var(--grn)">✅ ${ok} sucesso, ${fail} falhas</span>`;
  setTimeout(()=>{document.getElementById("batchModal").style.display="none";renderApp()},1500);
}

  document.getElementById("phoneModal").style.display="flex";
  document.getElementById("pmName").textContent=nome||"";
  document.getElementById("pmCPF").textContent="CPF: "+cpf+(ben?" | Ben: "+ben:"");
  document.getElementById("pmContent").innerHTML='<div style="text-align:center;padding:30px;color:var(--t2)"><div style="animation:pulse 1.2s ease infinite;font-size:28px;margin-bottom:10px">💳</div>Consultando cartões...</div>';
  document.getElementById("pmActions").innerHTML="";

  if(cardCache[cpf]){showCardResult(cardCache[cpf]);return}

  try{
    const res=await fetch('/api/cartao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:cpf.replace(/\D/g,''),matricula:ben||""})});
    const data=await res.json();
    if(data.success){cardCache[cpf]=data;showCardResult(data)}
    else{document.getElementById("pmContent").innerHTML=`<div style="text-align:center;padding:20px;color:var(--red)">❌ ${esc(data.error||"Erro")}<br><span style="font-size:11px;color:var(--t3)">${esc(data.detail||"")}</span>${data.debug?`<br><details style="margin-top:10px;text-align:left"><summary style="font-size:10px;color:var(--t3);cursor:pointer">Debug</summary><pre style="font-size:9px;color:var(--t3);white-space:pre-wrap;margin-top:6px">${esc(JSON.stringify(data.debug,null,2))}</pre></details>`:""}</div>`;
      document.getElementById("pmActions").innerHTML=`<button class="btn" onclick="document.getElementById('phoneModal').style.display='none'">Fechar</button>`}
  }catch(e){
    document.getElementById("pmContent").innerHTML=`<div style="text-align:center;padding:20px;color:var(--red)">❌ ${esc(e.message)}</div>`;
    document.getElementById("pmActions").innerHTML=`<button class="btn" onclick="document.getElementById('phoneModal').style.display='none'">Fechar</button>`}
}
function showCardResult(data){
  let bankColors={"318":"var(--acc)","623":"var(--org)","707":"var(--pnk)","BMG":"var(--acc)","PAN":"var(--org)","DAYCOVAL":"var(--pnk)"};
  let getBankColor=(b)=>{for(let k of Object.keys(bankColors))if(String(b).includes(k))return bankColors[k];return"var(--cyan)"};
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:15px;font-weight:700;color:var(--t1)">${esc(data.nome||"")}</div><div style="font-size:11px;color:var(--t3)">Fontes: ${data.fontes?data.fontes.join(", "):""}</div></div>`;
  if(data.telefones&&data.telefones.length){
    html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">`;
    for(let t of data.telefones){let num=`(${t.ddd}) ${t.telefone}`;let wl=`https://wa.me/55${t.ddd}${t.telefone}`;
      html+=`<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:8px"><span style="font-size:13px">📱</span><span style="font-family:monospace;font-size:13px;font-weight:700">${num}</span><a href="${wl}" target="_blank" style="text-decoration:none"><span class="pill pill-grn" style="cursor:pointer;font-size:10px">💬 Wpp</span></a></div>`}
    html+=`</div>`}
  if(!data.cartoes.length){html+=`<div style="padding:24px;text-align:center;color:var(--t3);font-size:14px">Nenhum cartão encontrado para este CPF</div>`}
  else{
    // Summary
    let totalDisp=data.cartoes.reduce((s,c)=>s+(c.limiteSaqueDisp||0),0);
    let totalLimite=data.cartoes.reduce((s,c)=>s+(c.limiteCartao||0),0);
    html+=`<div style="display:flex;gap:12px;margin-bottom:16px">
      <div style="flex:1;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--t3)">Total Saque Disponível</div><div style="font-size:24px;font-weight:900;color:var(--grn)">${R$(totalDisp)}</div></div>
      <div style="flex:1;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--t3)">Total Limite</div><div style="font-size:24px;font-weight:900;color:var(--acc)">${R$(totalLimite)}</div></div>
      <div style="flex:1;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:10px;padding:14px;text-align:center"><div style="font-size:11px;color:var(--t3)">Cartões</div><div style="font-size:24px;font-weight:900;color:var(--cyan)">${data.cartoes.length}</div></div>
    </div>`;
    // Each card
    for(let c of data.cartoes){
      let cor=getBankColor(c.banco);let saqueDisp=c.limiteSaqueDisp||0;
      html+=`<div style="background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:18px;margin-bottom:10px;border-left:4px solid ${cor}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div><span style="font-size:16px;font-weight:800;color:${cor}">${esc(c.banco||"?")}</span> <span style="font-size:12px;color:var(--t3)">${esc(c.produto||"")}</span></div>
          <span class="pill ${c.statusCartao==="ATIVO"||c.statusCartao==="Ativo"?"pill-grn":"pill-red"}">${esc(c.statusCartao||"?")}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          <div><div style="font-size:10px;color:var(--t3)">Limite Cartão</div><div style="font-size:17px;font-weight:700;color:var(--acc)">${R$(c.limiteCartao||0)}</div></div>
          <div><div style="font-size:10px;color:var(--t3)">Saque Disponível</div><div style="font-size:17px;font-weight:700;color:${saqueDisp>0?"var(--grn)":"var(--t3)"}">${R$(saqueDisp)}</div></div>
          <div><div style="font-size:10px;color:var(--t3)">Saque Mínimo</div><div style="font-size:17px;font-weight:700">${R$(c.minimoSaque||0)}</div></div>
          <div><div style="font-size:10px;color:var(--t3)">Margem</div><div style="font-size:15px;font-weight:700;color:var(--cyan)">${R$(c.margem||0)}</div></div>
          <div><div style="font-size:10px;color:var(--t3)">Utilizado</div><div style="font-size:15px;font-weight:700;color:var(--org)">${R$(c.limiteUtilizado||0)}</div></div>
          <div><div style="font-size:10px;color:var(--t3)">Saldo Devedor</div><div style="font-size:15px;font-weight:700;color:var(--red)">${R$(c.saldoDevedor||0)}</div></div>
        </div>
        ${c.matricula?`<div style="font-size:10px;color:var(--t3);margin-top:8px">Matrícula: <span style="font-family:monospace">${esc(c.matricula)}</span></div>`:""}
        ${c.observacao?`<div style="font-size:11px;color:var(--ylw);margin-top:4px">⚠️ ${esc(c.observacao)}</div>`:""}
      </div>`;
    }
  }
  if(data.errors&&data.errors.length){html+=`<div style="font-size:10px;color:var(--t3);margin-top:8px">⚠️ ${data.errors.join(", ")}</div>`}
  document.getElementById("pmContent").innerHTML=html;
  document.getElementById("pmActions").innerHTML=`<button class="btn" onclick="document.getElementById('phoneModal').style.display='none'">Fechar</button>`;
}

function exportRMC(){
  let D=S.data;if(!D)return;let wb=XLSX.utils.book_new(),mk=(a,n)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(a),n);
  mk(D.rmcRcc.map(r=>({Nome:r.nome,CPF:r.cpf,"Espécie":r.esp,Tel1:r.t1,"Banco RMC":r.cRmc,"Valor RMC":r.vRmc,"Banco RCC":r.cRcc,"Valor RCC":r.vRcc,"Margem Disp":r.mrgCart||0,"Cart Nova":r.mrgCartNova||0,"Emp Nova":r.mrgEmpNova||0,"Tem RMC":r.temRmc?"SIM":"NÃO","Tem RCC":r.temRcc?"SIM":"NÃO"})),"Todos");
  for(let[n,cod]of Object.entries(CARTAO))mk(D.rmcRcc.filter(r=>r.cRmc===cod||r.cRcc===cod).map(r=>({Nome:r.nome,CPF:r.cpf,Tel1:r.t1,"Valor RMC":r.vRmc,"Valor RCC":r.vRcc,"Margem":r.mrgCart||0,"Cart Nova":r.mrgCartNova||0})),n);
  mk(D.rmcRcc.filter(r=>r.mrgCart>0&&!r.temRmc&&!r.temRcc).map(r=>({Nome:r.nome,CPF:r.cpf,"Espécie":r.esp,Tel1:r.t1,"Margem":r.mrgCart,"Cartão Nova":r.mrgCartNova,"Empréstimo Novo":r.mrgEmpNova})),"Margem Nova");
  XLSX.writeFile(wb,"flowforce_rmc_rcc.xlsx");
}
function exportXLSX(){let D=S.data;if(!D)return;let wb=XLSX.utils.book_new(),mk=(a,n)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(a),n);
  // === RESUMO: grouped by client with all opportunity columns ===
  let rmcMap={};for(let r of D.rmcRcc)rmcMap[r.cpf]=r;
  let clientMap={};
  for(let e of D.elegiveis){
    if(!clientMap[e.cpf])clientMap[e.cpf]={nome:e.nome,cpf:e.cpf,t1:e.t1||"",trocoPort:0,pmtBaixa:0};
    clientMap[e.cpf].trocoPort+=e.troco||0;
  }
  // Add RMC/RCC saque data from cardCache
  for(let cpf of Object.keys(clientMap)){
    let rm=rmcMap[cpf],cc=cardCache[cpf];
    clientMap[cpf].mrgCartNova=rm?rm.mrgCartNova||0:0;
    clientMap[cpf].mrgEmpNova=rm?rm.mrgEmpNova||0:0;
    clientMap[cpf].saqueRmcBmg=0;clientMap[cpf].saqueRccBmg=0;clientMap[cpf].saqueDay=0;
    if(cc&&cc.cartoes){for(let c of cc.cartoes){
      let sd=c.limiteSaqueDisp||0;
      if(String(c.banco).includes("BMG")||String(c.fonte)==="BMG"){
        if(String(c.produto||"").includes("RCC"))clientMap[cpf].saqueRccBmg+=sd;
        else clientMap[cpf].saqueRmcBmg+=sd;
      }
      if(String(c.banco).includes("DAY")||String(c.fonte)==="DAYCOVAL")clientMap[cpf].saqueDay+=sd;
    }}
  }
  // Also add RMC-only clients not in elegiveis
  for(let r of D.rmcRcc){if(!clientMap[r.cpf]){
    let cc=cardCache[r.cpf];
    clientMap[r.cpf]={nome:r.nome,cpf:r.cpf,t1:r.t1||"",trocoPort:0,pmtBaixa:0,mrgCartNova:r.mrgCartNova||0,mrgEmpNova:r.mrgEmpNova||0,saqueRmcBmg:0,saqueRccBmg:0,saqueDay:0};
    if(cc&&cc.cartoes){for(let c of cc.cartoes){
      let sd=c.limiteSaqueDisp||0;
      if(String(c.banco).includes("BMG")||String(c.fonte)==="BMG"){
        if(String(c.produto||"").includes("RCC"))clientMap[r.cpf].saqueRccBmg+=sd;
        else clientMap[r.cpf].saqueRmcBmg+=sd;
      }
      if(String(c.banco).includes("DAY")||String(c.fonte)==="DAYCOVAL")clientMap[r.cpf].saqueDay+=sd;
    }}
  }}
  let resumo=Object.values(clientMap).map(c=>{
    let total=(c.trocoPort||0)+(c.mrgCartNova||0)+(c.mrgEmpNova||0)+(c.saqueRmcBmg||0)+(c.saqueRccBmg||0)+(c.saqueDay||0);
    return{NOME:c.nome,CPF:c.cpf,"TROCO PORT":Math.round((c.trocoPort||0)*100)/100,"CARTÃO NOVA":Math.round((c.mrgCartNova||0)*100)/100,"EMP NOVO":Math.round((c.mrgEmpNova||0)*100)/100,"SAQUE RMC BMG":Math.round((c.saqueRmcBmg||0)*100)/100,"SAQUE RCC BMG":Math.round((c.saqueRccBmg||0)*100)/100,"SAQUE DAY":Math.round((c.saqueDay||0)*100)/100,"TOTAL LÍQUIDO":Math.round(total*100)/100,Tel:c.t1}
  }).filter(r=>r["TOTAL LÍQUIDO"]>0).sort((a,b)=>b["TOTAL LÍQUIDO"]-a["TOTAL LÍQUIDO"]);
  mk(resumo,"Resumo");
  // Total row
  let totRow={NOME:"TOTAL",CPF:"","TROCO PORT":resumo.reduce((s,r)=>s+r["TROCO PORT"],0),"CARTÃO NOVA":resumo.reduce((s,r)=>s+r["CARTÃO NOVA"],0),"EMP NOVO":resumo.reduce((s,r)=>s+r["EMP NOVO"],0),"SAQUE RMC BMG":resumo.reduce((s,r)=>s+r["SAQUE RMC BMG"],0),"SAQUE RCC BMG":resumo.reduce((s,r)=>s+r["SAQUE RCC BMG"],0),"SAQUE DAY":resumo.reduce((s,r)=>s+r["SAQUE DAY"],0),"TOTAL LÍQUIDO":resumo.reduce((s,r)=>s+r["TOTAL LÍQUIDO"],0),Tel:""};
  mk([totRow,...resumo],"Total");
  // Existing sheets
  mk(D.analise.map(r=>({Nome:r.nome,CPF:r.cpf,Espécie:r.esp,Idade:r.idade,Invalidez:r.isInv?"SIM":"NÃO","1Paga":r.is1p?"SIM":"NÃO",Contrato:r.con,"Banco Origem":r.cod,Parcela:r.par,"Saldo Quit.":r.sal,Prazo:r.prazo,Pagas:r.pag,Destino:r.dest,"Vlr Contrato":r.vc,Troco:r.troco,Taxa:r.taxa,Elegível:r.ok?"SIM":"NÃO"})),"Análise Completa");
  mk(D.elegiveis.map(r=>{let ph=phoneCache[r.cpf],phs=ph?ph.telefones:[],wps=phs.filter(t=>t.whatsapp);return{Nome:r.nome,CPF:r.cpf,Contrato:r.con,"Banco Origem":r.cod,Parcela:r.par,"Saldo Quit.":r.sal,Prazo:r.prazo,Destino:r.dest,"Vlr Contrato":r.vc,Troco:r.troco,Taxa:r.taxa,"Tel Base 1":r.t1||"","Tel Base 2":r.t2||"","Tel Base 3":r.t3||"","Tel Hig 1":phs[0]?`(${phs[0].ddd}) ${phs[0].telefone}`:"","WhatsApp":wps[0]?`55${wps[0].ddd}${wps[0].telefone}`:"",Higienizado:ph?"SIM":"NÃO"}}),"Elegíveis");
  mk(D.mapaArr.map(m=>({"Banco":m.banco,Contratos:m.n,"Vlr Contrato":m.vcTotal,"Troco Total":m.total})),"Mapa");
  mk(D.rmcRcc.map(r=>({Nome:r.nome,CPF:r.cpf,Tel1:r.t1,"Banco RMC":r.cRmc,"Vlr RMC":r.vRmc,"Banco RCC":r.cRcc,"Vlr RCC":r.vRcc,"Margem":r.mrgCart||0,"Cart Nova (÷0.029214)":r.mrgCartNova||0,"Emp Novo (÷0.02299)":r.mrgEmpNova||0,"Tem Cartão":r.temCartao?"SIM":"NÃO"})),"RMC-RCC");
  mk(D.rmcRcc.filter(r=>!r.temCartao&&r.mrgCart>0).map(r=>({Nome:r.nome,CPF:r.cpf,Tel1:r.t1,"Margem":r.mrgCart,"Cartão Nova":r.mrgCartNova,"Empréstimo Novo":r.mrgEmpNova})),"Sem Cartão");
  XLSX.writeFile(wb,"flowforce_resultado.xlsx")}
