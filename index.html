<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lhamascred — Motor de Portabilidade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='8' y='24' font-size='22' font-weight='900' fill='white'>L</text></svg>">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060A10;--sf:#0C1118;--card:#131A24;--brd:#1C2536;--acc:#3B82F6;--grn:#22C55E;--red:#EF4444;--ylw:#EAB308;--pur:#A78BFA;--org:#F97316;--pnk:#EC4899;--t1:#E2E8F0;--t2:#8896AB;--t3:#4A5568}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::selection{background:var(--acc);color:#000}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fi{animation:fadeIn .35s ease both}.shake{animation:shake .3s ease}
button{font-family:inherit;cursor:pointer;transition:all .12s;border:none;background:none}button:hover{filter:brightness(1.15)}
input,select{font-family:inherit;outline:none}.rh:hover{background:rgba(59,130,246,0.03)!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:400px;animation:fadeIn .4s ease}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:36px}
.login-logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff}
.login-card{background:var(--sf);border:1px solid var(--brd);border-radius:16px;padding:36px 32px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:13px}
.form-input:focus{border-color:var(--acc)}
.login-btn{width:100%;padding:12px;border-radius:8px;background:var(--acc);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:14px;min-height:18px}
.header{background:var(--sf);border-bottom:1px solid var(--brd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.hdr-user{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:6px;background:var(--card);border:1px solid var(--brd);margin-right:6px}
.hdr-user-icon{width:22px;height:22px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.btn{padding:5px 13px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--brd);color:var(--t2);background:transparent}
.btn-grn{border-color:var(--grn);color:var(--grn)}.btn-red{border-color:var(--red);color:var(--red)}
.btn-acc{background:var(--acc);color:#fff;border:none;padding:9px 24px;border-radius:8px;font-size:12px;font-weight:700}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px}
.container{max-width:1440px;margin:0 auto;padding:20px 24px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--sf);border:1px solid var(--brd);border-radius:14px;padding:28px;max-width:420px;width:100%;animation:fadeIn .25s ease}
.table-wrap{background:var(--card);border-radius:10px;border:1px solid var(--brd);overflow:hidden}
.table-scroll{overflow:auto;max-height:62vh}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card);z-index:2;white-space:nowrap}
td{padding:7px 12px;font-size:12px;color:var(--t1);border-bottom:1px solid var(--brd);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
td.right,th.right{text-align:right}td.mono{font-family:'Cascadia Code','SF Mono',monospace;font-size:11px}td.bold{font-weight:700}
.pill{display:inline-block;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.03em}
.pill-default{background:rgba(255,255,255,.05);color:var(--t2)}
.pill-acc{background:rgba(59,130,246,.1);color:var(--acc)}.pill-pur{background:rgba(167,139,250,.1);color:var(--pur)}
.pill-ylw{background:rgba(234,179,8,.1);color:var(--ylw)}.pill-grn{background:rgba(34,197,94,.12);color:var(--grn)}
.pill-red{background:rgba(239,68,68,.1);color:var(--red)}.pill-org{background:rgba(249,115,22,.12);color:var(--org)}
.pill-pnk{background:rgba(236,72,153,.12);color:var(--pnk)}
.pager{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--brd);background:var(--sf);font-size:11px}
.pager-btns{display:flex;gap:3px;align-items:center}
.pager-btns button{padding:3px 9px;border-radius:4px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:12px}
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-bar input{padding:7px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:12px;width:240px}
.search-bar select{padding:7px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:12px}
.kpi-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--brd);flex:1 1 150px;min-width:130px}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600}
.kpi-value{font-size:17px;font-weight:800}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--sf);border-radius:9px;padding:3px;border:1px solid var(--brd);flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;font-weight:700;font-size:11px;color:var(--t2)}
.tab.active{background:var(--acc);color:#fff}
.tab-badge{margin-left:4px;padding:0 5px;border-radius:3px;font-size:9px}
.tab.active .tab-badge{background:rgba(255,255,255,.2)}.tab:not(.active) .tab-badge{background:var(--brd)}
.hist-grid{display:grid;gap:10px;margin-top:16px}
.hist-card{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hist-stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hist-stat{text-align:right}
.hist-stat-val{font-size:14px;font-weight:700}
.hist-stat-label{font-size:9px;color:var(--t3);text-transform:uppercase}
.admin-panel{background:var(--sf);border:1px solid var(--brd);border-radius:12px;padding:24px;margin-bottom:20px}
.users-table{width:100%;border-collapse:collapse}
.users-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--brd)}
.users-table td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--brd)}
.add-user-form{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:end}
.add-user-form .form-group{margin-bottom:0;flex:1;min-width:140px}
.add-user-form .form-label{margin-bottom:4px}
.add-user-form .form-input{padding:8px 10px;font-size:12px}
.role-admin{background:rgba(249,115,22,.12);color:var(--org);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.role-user{background:rgba(59,130,246,.1);color:var(--acc);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.upload-box{border:2px dashed var(--brd);border-radius:16px;padding:56px 44px;text-align:center;cursor:pointer;background:var(--sf);max-width:480px;width:100%;transition:border-color .2s}
.upload-box:hover,.upload-box.drag{border-color:var(--acc)}
.mapa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.rmc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.taxa-bar{height:6px;border-radius:3px;background:var(--brd);overflow:hidden}
.taxa-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--acc),var(--pur));transition:width .5s}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}.rmc-grid,.mapa-grid{grid-template-columns:1fr}.container{padding:12px}.header{padding:0 12px}}
</style>
</head>
<body>
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo"><div class="login-logo-icon">L</div><div><div style="font-size:22px;font-weight:800">Lhamascred</div><div style="font-size:11px;color:var(--t3)">Motor de Portabilidade</div></div></div>
    <div class="login-card" id="loginCard">
      <div style="font-size:18px;font-weight:700;text-align:center;margin-bottom:4px">Bem-vindo</div>
      <div style="font-size:12px;color:var(--t2);text-align:center;margin-bottom:28px">Entre com suas credenciais</div>
      <div class="form-group"><label class="form-label">Usuário</label><input class="form-input" type="text" id="loginUser" placeholder="Usuário" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="loginPass" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="login-btn" onclick="doLogin()">Entrar</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>
<div id="appScreen" style="display:none">
  <header class="header">
    <div class="logo"><div class="logo-icon">L</div><div><div style="font-size:14px;font-weight:800">Lhamascred</div><div style="font-size:9px;color:var(--t3);font-weight:600">Motor de Portabilidade v4</div></div></div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="hdr-user" id="hdrUser"></div>
      <div id="headerActions" style="display:flex;gap:6px;align-items:center">
        <span id="fileName" style="font-size:10px;color:var(--t3);margin-right:4px"></span>
        <button class="btn btn-grn" onclick="exportXLSX()">↓ Exportar</button>
        <button class="btn" onclick="resetData()">Nova Base</button>
      </div>
      <button class="btn btn-red btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <div class="container" id="appContainer"></div>
</div>
<div id="changePwModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">Alterar Senha</div>
    <div class="form-group"><label class="form-label">Senha Atual</label><input class="form-input" type="password" id="cpwOld"></div>
    <div class="form-group"><label class="form-label">Nova Senha</label><input class="form-input" type="password" id="cpwNew"></div>
    <div class="form-group"><label class="form-label">Confirmar</label><input class="form-input" type="password" id="cpwConfirm"></div>
    <div style="display:flex;gap:8px;margin-top:8px"><button class="login-btn" style="flex:1" onclick="doChangePw()">Salvar</button><button class="btn" style="padding:12px 20px" onclick="document.getElementById('changePwModal').style.display='none'">Cancelar</button></div>
    <div class="login-error" id="cpwError"></div>
  </div>
</div>
<!-- Phone Results Modal -->
<div id="phoneModal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700">📱 Telefones Higienizados</div>
      <button class="btn btn-sm" onclick="document.getElementById('phoneModal').style.display='none'">✕</button>
    </div>
    <div id="phoneModalName" style="font-size:13px;color:var(--t2);margin-bottom:4px"></div>
    <div id="phoneModalCPF" style="font-size:11px;color:var(--t3);margin-bottom:16px;font-family:monospace"></div>
    <div id="phoneModalContent"></div>
    <div id="phoneModalActions" style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap"></div>
  </div>
</div>

<!-- Batch Progress Modal -->
<div id="batchModal" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:480px">
    <div style="font-size:16px;font-weight:700;margin-bottom:12px">⏳ Higienização em Lote</div>
    <div id="batchProgress" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span id="batchCount" style="font-size:12px;color:var(--t2)">0/0</span><span id="batchPct" style="font-size:12px;font-weight:700;color:var(--acc)">0%</span></div>
      <div class="taxa-bar" style="height:8px"><div id="batchBar" class="taxa-fill" style="width:0%"></div></div>
    </div>
    <div id="batchStatus" style="font-size:11px;color:var(--t2);margin-bottom:12px"></div>
    <div style="display:flex;gap:8px"><button class="btn btn-red" onclick="batchCancel=true">Cancelar</button></div>
  </div>
</div>

<script>
// ══════ HIGIENIZAÇÃO ══════
let phoneCache={};
let batchCancel=false;

async function higienizarCPF(cpf,nome){
  document.getElementById("phoneModal").style.display="flex";
  document.getElementById("phoneModalName").textContent=nome||"";
  document.getElementById("phoneModalCPF").textContent="CPF: "+cpf;
  document.getElementById("phoneModalContent").innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)"><div style="animation:pulse 1.2s ease infinite;font-size:24px;margin-bottom:8px">📡</div>Consultando...</div>';
  document.getElementById("phoneModalActions").innerHTML="";

  // Check cache
  if(phoneCache[cpf]){showPhoneResult(phoneCache[cpf]);return}

  try{
    const res=await fetch('/api/higienizar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:cpf.replace(/\D/g,'')})});
    const data=await res.json();
    if(data.success){
      phoneCache[cpf]=data;
      showPhoneResult(data);
    }else{
      document.getElementById("phoneModalContent").innerHTML=`<div style="text-align:center;padding:20px;color:var(--red)">❌ Erro: ${esc(data.error||'Falha na consulta')}</div>`;
    }
  }catch(err){
    document.getElementById("phoneModalContent").innerHTML=`<div style="text-align:center;padding:20px;color:var(--red)">❌ Erro de conexão: ${esc(err.message)}</div>`;
  }
}

function showPhoneResult(data){
  let html="";
  if(!data.telefones||data.telefones.length===0){
    html=`<div style="text-align:center;padding:20px;color:var(--t3)">Nenhum telefone válido encontrado</div>`;
  }else{
    html=`<div style="font-size:11px;color:var(--t2);margin-bottom:10px">${data.totalValidos} telefone(s) válido(s) de ${data.totalEncontrados} encontrado(s)</div>`;
    html+=`<table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="padding:6px 8px;font-size:10px;border-bottom:1px solid var(--brd);color:var(--t3)">Telefone</th><th style="padding:6px 8px;font-size:10px;border-bottom:1px solid var(--brd);color:var(--t3)">Tipo</th><th style="padding:6px 8px;font-size:10px;border-bottom:1px solid var(--brd);color:var(--t3)">Operadora</th><th style="padding:6px 8px;font-size:10px;border-bottom:1px solid var(--brd);color:var(--t3)">WhatsApp</th><th style="padding:6px 8px;font-size:10px;border-bottom:1px solid var(--brd);color:var(--t3)">Ação</th></tr></thead><tbody>`;
    for(let t of data.telefones){
      let full=`(${t.ddd}) ${t.telefone}`;
      let wpp=t.whatsapp;
      let wppLink=`https://wa.me/55${t.ddd}${t.telefone}`;
      html+=`<tr>
        <td style="padding:6px 8px;font-size:13px;font-family:monospace;font-weight:700;border-bottom:1px solid var(--brd)">${full}</td>
        <td style="padding:6px 8px;font-size:11px;border-bottom:1px solid var(--brd)">${t.tipo||"-"}</td>
        <td style="padding:6px 8px;font-size:11px;border-bottom:1px solid var(--brd)">${t.operadora||"-"}</td>
        <td style="padding:6px 8px;border-bottom:1px solid var(--brd)">${wpp?'<span class="pill pill-grn">SIM</span>':'<span class="pill pill-default">NÃO</span>'}</td>
        <td style="padding:6px 8px;border-bottom:1px solid var(--brd)">${wpp?`<a href="${wppLink}" target="_blank" style="text-decoration:none"><span class="pill pill-grn" style="cursor:pointer">💬 WhatsApp</span></a>`:""}</td>
      </tr>`;
    }
    html+=`</tbody></table>`;
  }
  document.getElementById("phoneModalContent").innerHTML=html;
  
  // Copy all phones button
  if(data.telefones&&data.telefones.length>0){
    let allPhones=data.telefones.map(t=>`(${t.ddd}) ${t.telefone}`).join(", ");
    document.getElementById("phoneModalActions").innerHTML=`
      <button class="btn btn-grn" onclick="navigator.clipboard.writeText('${allPhones}');this.textContent='✅ Copiado!'">📋 Copiar Todos</button>
      ${data.telefones.filter(t=>t.whatsapp).length>0?`<button class="btn-acc" style="padding:8px 16px;font-size:11px" onclick="sendAllWpp('${data.cpf}')">💬 WhatsApp em Lote</button>`:""}
    `;
  }
}

function sendAllWpp(cpf){
  let data=phoneCache[cpf];if(!data)return;
  let wppPhones=data.telefones.filter(t=>t.whatsapp);
  for(let t of wppPhones){
    window.open(`https://wa.me/55${t.ddd}${t.telefone}`,"_blank");
  }
}

async function batchHigienizar(){
  if(!S.data)return;
  let cpfs=[...new Set(S.data.elegiveis.map(e=>e.cpf).filter(c=>c&&!phoneCache[c]))];
  if(cpfs.length===0){alert("Todos os CPFs já foram higienizados!");return}
  if(!confirm(`Higienizar ${cpfs.length} CPFs? Isso pode levar alguns minutos.`))return;
  
  batchCancel=false;
  document.getElementById("batchModal").style.display="flex";
  let done=0,ok=0,fail=0;
  
  for(let cpf of cpfs){
    if(batchCancel)break;
    document.getElementById("batchStatus").textContent=`Consultando: ${cpf}`;
    try{
      const res=await fetch('/api/higienizar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:cpf.replace(/\D/g,'')})});
      const data=await res.json();
      if(data.success){phoneCache[cpf]=data;ok++}else{fail++}
    }catch{fail++}
    done++;
    let pct=Math.round(done/cpfs.length*100);
    document.getElementById("batchCount").textContent=`${done}/${cpfs.length}`;
    document.getElementById("batchPct").textContent=pct+"%";
    document.getElementById("batchBar").style.width=pct+"%";
    // Rate limit: wait 500ms between calls
    await new Promise(r=>setTimeout(r,500));
  }
  
  document.getElementById("batchStatus").innerHTML=`<span style="color:var(--grn)">✅ Concluído! ${ok} sucesso, ${fail} falhas</span>`;
  setTimeout(()=>{document.getElementById("batchModal").style.display="none";renderApp()},2000);
}

function exportWithPhones(){
  if(!S.data)return;
  let wb=XLSX.utils.book_new();
  let rows=S.data.elegiveis.map(r=>{
    let ph=phoneCache[r.cpf];
    let phones=ph?ph.telefones:[];
    let wppPhones=phones.filter(t=>t.whatsapp);
    return{
      Nome:r.nome,CPF:r.cpf,Contrato:r.con,"Banco Origem":r.cod,
      Parcela:r.par,"Saldo Quit.":r.sal,Prazo:r.prazo,Pagas:r.pag,
      Destino:r.dest,"Vlr Contrato":r.vc,Troco:r.troco,Taxa:r.taxa,
      "Tel 1 Higienizado":phones[0]?`(${phones[0].ddd}) ${phones[0].telefone}`:"",
      "Tel 2 Higienizado":phones[1]?`(${phones[1].ddd}) ${phones[1].telefone}`:"",
      "Tel 3 Higienizado":phones[2]?`(${phones[2].ddd}) ${phones[2].telefone}`:"",
      "WhatsApp 1":wppPhones[0]?`55${wppPhones[0].ddd}${wppPhones[0].telefone}`:"",
      "WhatsApp 2":wppPhones[1]?`55${wppPhones[1].ddd}${wppPhones[1].telefone}`:"",
      "Higienizado":ph?"SIM":"NÃO"
    };
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Elegíveis + Telefones");
  XLSX.writeFile(wb,"lhamascred_elegíveis_higienizados.xlsx");
}

const COEFS=[{t:1.85,c:0.02299},{t:1.80,c:0.02451},{t:1.78,c:0.02250},{t:1.75,c:0.021985},{t:1.72,c:0.02175},{t:1.70,c:0.021604},{t:1.68,c:0.02145},{t:1.66,c:0.02130}];
const BD={QUALI:{sMin:2000,tMin:250,pMin:0,pgMin:0,faixa:null,coefF:null,block:["359","246","025","047","063","070","320","394","422","654","212","626","935","753","330","149","012","752","082","079","329","643","243"]},FACTA:{sMin:0,tMin:100,pMin:50,pgMin:0,faixa:[1.70,1.85],coefF:null,block:["070","071","925","935","149","012","611","643","917"]},BRB:{sMin:3000,tMin:250,pMin:0,pgMin:0,faixa:null,coefF:0.02130,block:["070","623","935","149","012","071","925","380","079"]},DIGIO:{sMin:4500,tMin:250,pMin:0,pgMin:12,faixa:null,coefF:null,block:["237","001","041"]}};
const ORDEM=["QUALI","FACTA","BRB","DIGIO"];
const B1P=["149","422","739","925","380","033","326","290","041","389","121"];
const ESP_INV=[4,5,6,32,33,34,51,83,92];
const CARTAO={PAN:"623",BMG:"318",Daycoval:"707"};

function pV(v){if(v==null||v==="")return 0;if(typeof v==="number")return v;let s=String(v).replace(/R\$\s*/g,"").replace(/\s/g,"");if(s.includes(","))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;if(s.includes("."))return parseFloat(s)||0;let n=parseInt(s,10);return isNaN(n)?0:n>99?n/100:n}
function pP(v){if(v==null||v==="")return[0,0,0];let m=String(v).match(/(\d+)\s*[/\\]\s*(\d+)/);if(m){let r=+m[1],t=+m[2];return[r,t,t-r]}let n=parseInt(v,10);return[n||0,n||0,0]}
function pC(v){if(v==null||v==="")return"";return String(typeof v==="number"?Math.floor(v):v).trim().padStart(3,"0")}
function pEN(e){if(!e)return 0;let m=String(e).match(/^(\d+)/);return m?parseInt(m[1],10):0}
function cAge(ns){if(ns==null)return null;let d;if(ns instanceof Date)d=ns;else if(typeof ns==="number")d=new Date((ns-25569)*864e5);else{let s=String(ns).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),a=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))a--;return{age:a}}
function cBY(dib){if(dib==null)return null;let d;if(dib instanceof Date)d=dib;else if(typeof dib==="number")d=new Date((dib-25569)*864e5);else{let s=String(dib).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),y=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))y--;return y}
function bestR(par,sal,tMin,fx){let pool=fx?COEFS.filter(c=>c.t>=fx[0]&&c.t<=fx[1]):COEFS;for(let{t,c}of pool){let vc=par/c,tr=vc-sal;if(tr>=tMin)return{t,c,vc,tr}}return null}
function testar(par,sal,pag,cod,isInv,idade,bY,rest){let is1p=B1P.includes(cod);for(let b of ORDEM){let r=BD[b];if(r.block.includes(cod))continue;if(r.pMin&&par<r.pMin)continue;if(r.sMin&&sal<r.sMin)continue;let pgR=is1p?1:r.pgMin;if(pgR&&pag<pgR)continue;if(isInv&&idade!==null){if(idade<55)continue;if(idade>=55&&idade<=57&&(bY===null||bY<15))continue;if(rest>0){let m75=(75-idade)*12;if(rest>m75)continue}}if(r.coefF){let vc=par/r.coefF,tr=vc-sal;if(tr<r.tMin)continue;let tx=COEFS.find(x=>x.c===r.coefF);return{banco:b,troco:tr,vc,taxa:tx?tx.t:0,is1p}}let res=bestR(par,sal,r.tMin,r.faixa);if(res)return{banco:b,troco:res.tr,vc:res.vc,taxa:res.t,is1p}}return null}

// ══════ COLUMN DETECTION (FIXED) ══════
// Find ALL positions of a header name (handles duplicates)
function findAllPos(H, name){
  let r=[],nm=name.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
  for(let i=0;i<H.length;i++){
    let hn=String(H[i]||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
    if(hn===nm)r.push(i);
  }
  return r;
}
function findFirst(H, names){
  for(let name of names){
    let nm=name.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
    for(let i=0;i<H.length;i++){
      let hn=String(H[i]||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
      if(hn===nm)return i;
    }
  }
  return -1;
}

function processar(data){
  if(!data||data.length<2)return null;
  let H=data[0].map(h=>h?String(h).trim():""),rows=data.slice(1);

  // Single columns
  let cNm=findFirst(H,["Nome"]);
  let cCP=findFirst(H,["CPF"]);
  let cBn=findFirst(H,["Beneficio"]);
  let cEs=findFirst(H,["Especie"]);
  let cNs=findFirst(H,["Data Nascimento"]);
  let cDI=findFirst(H,["DIB"]);
  let cT1=findFirst(H,["Telefone1"]);
  let cT2=findFirst(H,["Telefone2"]);
  let cT3=findFirst(H,["Telefone3"]);

  // Find ALL positions of repeated headers
  let allTipoEmp=findAllPos(H,"Tipo Emprestimo");
  let allContrato=findAllPos(H,"Contrato");
  let allCodigo=findAllPos(H,"Codigo");
  let allValEmp=findAllPos(H,"Valor Emprestimo");
  let allMargCartao=findAllPos(H,"Margem Cartao");
  let allValParc=findAllPos(H,"Valor Parcela");
  let allPrazo=findAllPos(H,"Prazo");
  let allSaldoQ=findAllPos(H,"Saldo Quitacao");
  let allTaxa=findAllPos(H,"Taxa");

  // RMC block: 1st Tipo Emprestimo that has Margem Cartao nearby
  let rmcBlock=null,rccBlock=null;
  let cardBlocks=[];
  for(let te of allTipoEmp){
    let mc=allMargCartao.find(m=>m>te&&m<te+8);
    if(mc!==undefined)cardBlocks.push(te);
  }
  if(cardBlocks.length>=1){
    let te=cardBlocks[0];
    rmcBlock={
      tipo:te,
      con:allContrato.find(c=>c>te&&c<te+8),
      cod:allCodigo.find(c=>c>te&&c<te+8),
      val:allValEmp.find(v=>v>te&&v<te+8),
      marg:allMargCartao.find(m=>m>te&&m<te+8)
    };
  }
  if(cardBlocks.length>=2){
    let te=cardBlocks[1];
    rccBlock={
      tipo:te,
      con:allContrato.find(c=>c>te&&c<te+8),
      cod:allCodigo.find(c=>c>te&&c<te+8),
      val:allValEmp.find(v=>v>te&&v<te+8),
      marg:allMargCartao.find(m=>m>te&&m<te+8)
    };
  }

  // Loan blocks: each "Valor Parcela" marks a loan block
  let loanBlocks=[];
  for(let vp of allValParc){
    let con=allContrato.filter(c=>c<vp).pop(); // closest Contrato before Valor Parcela
    let cod=allCodigo.find(c=>c>con-1&&c<vp);
    let prz=allPrazo.find(p=>p>vp&&p<vp+4);
    let sq=allSaldoQ.find(s=>s>vp&&s<vp+5);
    if(con!==undefined)loanBlocks.push({cc:con,ck:cod,cp:vp,cz:prz,cs:sq});
  }

  let analise=[],elegiveis=[],rmcAll=[];
  let g=(r,c)=>c!=null&&c>=0&&r[c]!=null?String(r[c]).trim():"";
  let gv=(r,c)=>c!=null&&c>=0?pV(r[c]):0;
  let gr=(r,c)=>c!=null&&c>=0?r[c]:null;

  for(let row of rows){
    let nome=g(row,cNm),cpf=g(row,cCP);if(!nome&&!cpf)continue;
    let ben=g(row,cBn),esp=g(row,cEs),t1=g(row,cT1),t2=g(row,cT2),t3=g(row,cT3);
    let eN=pEN(esp),isInv=ESP_INV.includes(eN);
    let ai=cAge(gr(row,cNs)),idade=ai?ai.age:null;
    let bY=cBY(gr(row,cDI));

    // RMC/RCC
    let tRmc=rmcBlock?g(row,rmcBlock.tipo):"";
    let cRmc=rmcBlock?pC(gr(row,rmcBlock.cod)??""):"";
    let vRmc=rmcBlock?gv(row,rmcBlock.val):0;
    let coRmc=rmcBlock?g(row,rmcBlock.con):"";
    let tRcc=rccBlock?g(row,rccBlock.tipo):"";
    let cRcc=rccBlock?pC(gr(row,rccBlock.cod)??""):"";
    let vRcc=rccBlock?gv(row,rccBlock.val):0;
    let coRcc=rccBlock?g(row,rccBlock.con):"";
    if(tRmc.toUpperCase().includes("RMC")||tRcc.toUpperCase().includes("RCC")||vRmc>0||vRcc>0)
      rmcAll.push({nome,cpf,ben,esp,t1,t2,t3,tRmc,coRmc,cRmc,vRmc:Math.round(vRmc*100)/100,tRcc,coRcc,cRcc,vRcc:Math.round(vRcc*100)/100});

    // Loans
    for(let lb of loanBlocks){
      let con=g(row,lb.cc),par=gv(row,lb.cp),sal=gv(row,lb.cs);
      let[rest,tot,pag]=lb.cz!=null?pP(row[lb.cz]):[0,0,0];
      let cod=lb.ck!=null?pC(gr(row,lb.ck)??""):"";
      if(!con&&par===0&&sal===0)continue;
      let is1p=B1P.includes(cod);
      let res=testar(par,sal,pag,cod,isInv,idade,bY,rest);
      analise.push({nome,cpf,ben,esp,con,cod,par:Math.round(par*100)/100,sal:Math.round(sal*100)/100,prazo:`${rest}/${tot}`,pag,idade:idade??"-",isInv,is1p,dest:res?res.banco:"-",troco:res?Math.round(res.troco*100)/100:0,vc:res?Math.round(res.vc*100)/100:0,taxa:res?res.taxa:"-",ok:!!res});
      if(res)elegiveis.push(analise[analise.length-1]);
    }
  }

  let mapa={};for(let e of elegiveis){if(!mapa[e.dest])mapa[e.dest]={banco:e.dest,n:0,total:0,vcTotal:0};mapa[e.dest].n++;mapa[e.dest].total+=e.troco;mapa[e.dest].vcTotal+=e.vc}
  let mapaArr=ORDEM.map(b=>mapa[b]||{banco:b,n:0,total:0,vcTotal:0}).filter(m=>m.n>0).map(m=>({...m,med:m.n?m.total/m.n:0,vcMed:m.n?m.vcTotal/m.n:0}));
  let taxaDist={};for(let e of elegiveis)taxaDist[e.taxa]=(taxaDist[e.taxa]||0)+1;
  return{analise,elegiveis,mapaArr,rmcRcc:rmcAll,taxaDist}
}

    let ub=document.getElementById("uploadBox");ub.addEventListener("dragover",e=>{e.preventDefault();ub.classList.add("drag")});ub.addEventListener("dragleave",()=>ub.classList.remove("drag"));ub.addEventListener("drop",e=>{e.preventDefault();ub.classList.remove("drag");if(e.dataTransfer.files[0]){let inp=document.getElementById("fileInput");let dt=new DataTransfer();dt.items.add(e.dataTransfer.files[0]);inp.files=dt.files;handleFile(inp)}});return}
  document.getElementById("headerActions").style.display="flex";document.getElementById("fileName").textContent="📁 "+S.fname;
  let tabs=[{k:"dash",l:"Dashboard"},{k:"an",l:"Análise",n:N(D.analise.length)},{k:"el",l:"Elegíveis",n:N(D.elegiveis.length)},{k:"mp",l:"Mapa",n:D.mapaArr.length},{k:"rc",l:"RMC/RCC",n:N(D.rmcRcc.length)},{k:"hist",l:"📁 Histórico"}];if(CU&&CU.role==="admin")tabs.push({k:"admin",l:"👥 Usuários"});

    html+=`</div></div><div><div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Distribuição por Taxa</div><div style="background:var(--card);border-radius:10px;border:1px solid var(--brd);padding:16px">`;
    for(let[t,cnt]of Object.entries(D.taxaDist).sort((a,b)=>b[0]-a[0])){let pct=D.elegiveis.length?(cnt/D.elegiveis.length)*100:0;html+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700">${t}%</span><span style="font-size:11px;color:var(--t2)">${N(cnt)} (${pct.toFixed(1)}%)</span></div><div class="taxa-bar"><div class="taxa-fill" style="width:${pct}%"></div></div></div>`}
    html+=`</div><div style="font-size:12px;font-weight:700;color:var(--t2);margin:16px 0 10px;text-transform:uppercase;letter-spacing:.06em">REGRA 2</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--brd)"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">1 Paga (elegíveis)</div><div style="font-size:16px;font-weight:800;color:var(--org)">${N(D.elegiveis.filter(e=>e.is1p).length)}</div></div><div style="background:var(--card);border-radius:8px;padding:12px;border:1px solid var(--brd)"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px">Invalidez (elegíveis)</div><div style="font-size:16px;font-weight:800;color:var(--pnk)">${N(D.elegiveis.filter(e=>e.isInv).length)}</div></div></div></div></div>`;
    let bC={PAN:"var(--org)",BMG:"var(--acc)",Daycoval:"var(--pnk)"};html+=`<div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">RMC / RCC por Banco</div><div class="rmc-grid">`;for(let[n,cod]of Object.entries(CARTAO)){let f=D.rmcRcc.filter(r=>r.cRmc===cod||r.cRcc===cod);html+=`<div style="background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--brd);border-left:3px solid ${bC[n]}"><div style="font-size:15px;font-weight:800;color:${bC[n]};margin-bottom:8px">${n} <span style="font-size:10px;color:var(--t3);font-weight:400">(${cod})</span></div><div style="font-size:22px;font-weight:800">${f.length}</div><div style="font-size:10px;color:var(--t3)">clientes</div></div>`}html+=`</div>`}

  if(S.tab==="an"||S.tab==="el"){let src=S.tab==="an"?D.analise:D.elegiveis,filtered=filt(src),items=filtered.slice(S.pg*PER,(S.pg+1)*PER),isAn=S.tab==="an";
    html+=`<div class="search-bar"><input type="text" placeholder="Buscar nome, CPF, contrato..." value="${esc(S.q)}" oninput="setQ(this.value)">${S.tab==="el"?`<button class="btn-acc" style="padding:6px 14px;font-size:10px" onclick="batchHigienizar()">📱 Higienizar Todos</button><button class="btn btn-grn" style="font-size:10px" onclick="exportWithPhones()">↓ Exportar c/ Fones</button><span style="font-size:10px;color:var(--t3)">${Object.keys(phoneCache).length} higienizados</span>`:""}</div>`;

    html+=`<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Nome</th><th>CPF</th><th>Benefício</th><th>Espécie</th><th>Tel 1</th><th>Tel 2</th><th>Tipo RMC</th><th>Banco RMC</th><th class="right">Valor RMC</th><th>Tipo RCC</th><th>Banco RCC</th><th class="right">Valor RCC</th></tr></thead><tbody>`;

    html+=`</tbody></table></div>${pgr(filtered.length)}</div>`}
  c.innerHTML=html}

function exportXLSX(){let D=S.data;if(!D)return;let wb=XLSX.utils.book_new(),mk=(a,n)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(a),n);

  mk(D.elegiveis.map(r=>({Nome:r.nome,CPF:r.cpf,Contrato:r.con,"Banco Origem":r.cod,Parcela:r.par,"Saldo Quit.":r.sal,Prazo:r.prazo,Pagas:r.pag,Destino:r.dest,"Vlr Contrato":r.vc,Troco:r.troco,Taxa:r.taxa,"1Paga":r.is1p?"SIM":"NÃO",Invalidez:r.isInv?"SIM":"NÃO"})),"Elegíveis");
  mk(D.mapaArr.map(m=>({"Banco Destino":m.banco,Contratos:m.n,"Vlr Contrato Total":m.vcTotal,"Troco Total":m.total,"Vlr Contrato Médio":m.vcMed,"Troco Médio":m.med})),"Mapa Portabilidade");
  mk(D.rmcRcc.map(r=>({Nome:r.nome,CPF:r.cpf,Benefício:r.ben,Espécie:r.esp,Tel1:r.t1,Tel2:r.t2,Tel3:r.t3,"Tipo RMC":r.tRmc,"Banco RMC":r.cRmc,"Valor RMC":r.vRmc,"Tipo RCC":r.tRcc,"Banco RCC":r.cRcc,"Valor RCC":r.vRcc})),"RMC-RCC Todos");
  for(let[n,cod]of Object.entries(CARTAO))mk(D.rmcRcc.filter(r=>r.cRmc===cod||r.cRcc===cod).map(r=>({Nome:r.nome,CPF:r.cpf,Benefício:r.ben,Espécie:r.esp,Tel1:r.t1,Tel2:r.t2,Tel3:r.t3,"Tipo RMC":r.tRmc,"Banco RMC":r.cRmc,"Valor RMC":r.vRmc,"Tipo RCC":r.tRcc,"Banco RCC":r.cRcc,"Valor RCC":r.vRcc})),`RMC-RCC ${n}`);
